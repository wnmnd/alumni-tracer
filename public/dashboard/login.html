<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login - Dashboard Tracer Alumni BAZNAS</title>
<style>
  :root {
    --baznas-green: #14320b;
    --baznas-green-dark: #0d2508;
    --baznas-gold: #cd9933;
    --baznas-cream: #faf7f0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, var(--baznas-green) 0%, var(--baznas-green-dark) 100%);
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    border-top: 6px solid var(--baznas-gold);
  }
  .card h1 {
    font-size: 20px;
    color: var(--baznas-green-dark);
    margin: 0 0 4px;
    text-align: center;
  }
  .card p.subtitle {
    text-align: center;
    color: #6b7280;
    font-size: 13px;
    margin: 0 0 28px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--baznas-green-dark);
    margin: 14px 0 6px;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
  }
  input:focus {
    outline: none;
    border-color: var(--baznas-green);
    box-shadow: 0 0 0 3px rgba(20, 50, 11, 0.15);
  }
  button {
    margin-top: 24px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--baznas-green);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: var(--baznas-green-dark); }
  button:disabled { opacity: 0.6; cursor: default; }
  #errorBox {
    display: none;
    margin-top: 14px;
    background: #fdecea;
    color: #b91c1c;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
  }
  .badge {
    display: block;
    text-align: center;
    margin-bottom: 18px;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--baznas-gold);
    font-weight: 700;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="card">
    <span class="badge">BAZNAS</span>
    <h1>Dashboard Tracer Alumni</h1>
    <p class="subtitle">Masuk untuk melihat data dan analisis alumni</p>
    <form id="loginForm">
      <label>Username</label>
      <input name="username" autocomplete="username" required />
      <label>Password</label>
      <input name="password" type="password" autocomplete="current-password" required />
      <div id="errorBox"></div>
      <button type="submit" id="submitBtn">Masuk</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Memproses...';

      const formData = new FormData(form);
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: formData.get('username'),
            password: formData.get('password'),
          }),
        });
        const result = await res.json();
        if (!res.ok || !result.success) {
          errorBox.textContent = result.message || 'Login gagal.';
          errorBox.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Masuk';
          return;
        }
        window.location.href = '/dashboard';
      } catch (err) {
        errorBox.textContent = 'Gagal terhubung ke server. Coba lagi.';
        errorBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Masuk';
      }
    });
  </script>
</body>
</html>
