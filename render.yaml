services:
  - type: web
    name: baznas-alumni-tracer
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: 10000
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: GRAPH_API_VERSION
        value: v23.0
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: FLOW_TRIGGER_KEYWORD
        value: tracer alumni
      - key: FLOW_ID
        sync: false
      - key: FLOW_PRIVATE_KEY
        sync: false
      - key: FLOW_PRIVATE_KEY_PASSPHRASE
        sync: false
      - key: APPS_SCRIPT_URL
        sync: false
      - key: APPS_SCRIPT_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openrouter/free
      - key: NODE_ENV
        value: production
